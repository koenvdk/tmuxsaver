name: Release

on:
  push:
    tags:
      - 'v*'   # trigger on v0.1.0, v1.2.3, etc.

jobs:
  build-deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: make deb

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "tmuxsaver ${{ github.ref_name }}"
          body: |
            ## Install

            Download the `.deb` below and install with:

            ```bash
            wget -P /tmp https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tmuxsaver_${{ steps.version.outputs.version }}_all.deb
            sudo apt install /tmp/tmuxsaver_${{ steps.version.outputs.version }}_all.deb
            ```

            Then follow the post-install instructions to enable the systemd service
            and (optionally) per-session shell history.

            See [README](https://github.com/${{ github.repository }}#readme) for full details.
          files: "*.deb"
          generate_release_notes: true
